# SonarQube Project Configuration
# ─────────────────────────────────────────────
sonar.projectKey=devsecops-demo
sonar.projectName=DevSecOps Demo Application
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=app
sonar.tests=tests

# Language
sonar.language=py
sonar.python.version=3.11

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/venv/**,.venv/**

# Quality Gate settings (configured in SonarQube UI)
# - Coverage >= 70%
# - No new CRITICAL/BLOCKER issues
# - No hardcoded credentials (sonar.security)
# - Duplication < 15%
