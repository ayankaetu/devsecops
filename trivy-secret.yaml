rules:
  - id: custom-db-password
    category: general
    title: Hardcoded Database Password
    severity: CRITICAL
    regex: '(?i)(db_password|database_password)\s*=\s*["\'][^"\']{4,}["\']'
    keywords:
      - db_password
      - database_password

  - id: custom-api-key
    category: general
    title: Hardcoded API Key
    severity: HIGH
    regex: '(?i)api[_-]?key\s*[:=]\s*["\'][a-zA-Z0-9]{20,}["\']'
    keywords:
      - api_key
      - apikey

  - id: custom-jwt-secret
    category: general
    title: Hardcoded JWT Secret
    severity: CRITICAL
    regex: '(?i)jwt[_-]?secret\s*[:=]\s*["\'][^"\']{8,}["\']'
    keywords:
      - jwt_secret
      - jwt-secret
